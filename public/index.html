<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VC美国电话</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="/jssip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#f5f5f5;--bg2:#ffffff;--bg3:#f0f0f0;--bg4:#e5e5e5;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.12);--text:#1a1a1a;--text2:#666666;--text3:#999999;--green:#07c160;--green2:#06ad56;--green3:#1a1a1a;--blue:#10aeff;--red:#fa5151;--amber:#ff9500;--sent:#95ec69;--recv:#ffffff;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;}
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;padding:20px;}
.login-card{background:var(--bg2);border-radius:16px;padding:40px 32px;width:100%;max-width:380px;}
.login-logo{text-align:center;margin-bottom:28px;}
.logo-circle{width:72px;height:72px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:32px;}
.login-logo h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.login-logo p{font-size:13px;color:var(--text2);}
.field-group{margin-bottom:16px;}
.field-group label{display:block;font-size:12px;color:var(--green);margin-bottom:6px;font-weight:600;}
.field-group input{width:100%;padding:12px 16px;background:var(--bg3);border:none;border-bottom:2px solid var(--border2);color:var(--text);font-size:15px;outline:none;transition:border-color 0.2s;border-radius:4px 4px 0 0;}
.field-group input:focus{border-bottom-color:var(--green);}
.field-group input::placeholder{color:var(--text3);}
.login-error{background:rgba(241,92,109,0.15);border-left:3px solid var(--red);border-radius:4px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none;}
.btn-login{width:100%;padding:14px;background:var(--green);border:none;border-radius:24px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity 0.2s;}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;}
#app-screen{display:none;height:100vh;height:100dvh;flex-direction:column;}
.topbar{height:56px;background:var(--bg2);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;border-bottom:1px solid var(--border);}
.topbar-avatar{width:36px;height:36px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer;}
.topbar-title{font-size:17px;font-weight:700;flex:1;}
.did-pill{background:var(--bg3);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--green);font-family:monospace;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:none;outline:none;cursor:pointer;}
.icon-btn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background 0.15s;}
.icon-btn:hover{background:var(--bg3);}
.app-body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:380px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.sidebar-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-tab{flex:1;padding:14px 0;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;border-bottom:2px solid transparent;transition:all 0.2s;}
.sidebar-tab.active{color:var(--green);border-bottom-color:var(--green);}
.sidebar-search{padding:8px 12px;background:var(--bg2);flex-shrink:0;}
.sidebar-search input{width:100%;padding:8px 16px;background:var(--bg3);border:none;border-radius:8px;color:var(--text);font-size:14px;outline:none;}
.sidebar-search input::placeholder{color:var(--text3);}
.list-container{flex:1;overflow-y:auto;}
.list-container::-webkit-scrollbar{width:4px;}
.list-container::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
.thread-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s;}
.thread-item:hover,.thread-item.active{background:var(--bg3);}
.t-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;}
.t-info{flex:1;min-width:0;}
.t-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.t-name{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.t-time{font-size:11px;color:var(--text3);flex-shrink:0;margin-left:8px;}
.t-bottom{display:flex;justify-content:space-between;align-items:center;}
.t-preview{font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.t-badge{background:var(--green);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-left:8px;}
.fab{position:absolute;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,168,132,0.4);z-index:10;}
.contact-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s;}
.contact-item:hover{background:var(--bg3);}
.c-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;}
.c-info{flex:1;min-width:0;}
.c-name{font-size:15px;font-weight:500;}
.c-num{font-size:13px;color:var(--text2);font-family:monospace;}
.c-actions{display:flex;gap:4px;}
.c-btn{width:34px;height:34px;border-radius:50%;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background 0.15s;}
.c-btn:hover{background:var(--bg4);}
.contact-letter{padding:6px 16px;font-size:12px;font-weight:700;color:var(--green);background:var(--bg2);letter-spacing:1px;}
.call-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);transition:background 0.1s;}
.call-item:hover{background:var(--bg3);}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{height:56px;background:var(--bg2);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;border-bottom:1px solid var(--border);}
.ch-name{font-size:16px;font-weight:600;}
.ch-status{font-size:12px;color:var(--text2);}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:2px;background-image:radial-gradient(circle at 1px 1px,rgba(0,0,0,0.03) 1px,transparent 0);background-size:20px 20px;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px;}
.day-label{text-align:center;margin:12px 0;}
.day-label span{background:var(--bg2);color:var(--text2);font-size:12px;padding:4px 12px;border-radius:8px;}
.msg-row{display:flex;margin-bottom:2px;}
.msg-row.sent{justify-content:flex-end;}
.msg-row.recv{justify-content:flex-start;}
.msg-bubble{max-width:65%;padding:8px 12px 6px;border-radius:8px;word-break:break-word;position:relative;}
.msg-row.sent .msg-bubble{background:var(--sent);border-bottom-right-radius:2px;color:#1a1a1a;box-shadow:0 1px 2px rgba(0,0,0,0.06);}
.msg-row.recv .msg-bubble{background:var(--recv);border-bottom-left-radius:2px;color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,0.06);}
.msg-text{font-size:14px;line-height:1.5;}
.msg-meta{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:2px;}
.msg-time{font-size:11px;color:rgba(0,0,0,0.35);}
.msg-row.sent .msg-time{color:rgba(0,0,0,0.4);}
.msg-tick{font-size:14px;color:rgba(0,0,0,0.35);}
.msg-tick.read{color:var(--blue);}
.compose-bar{background:var(--bg2);padding:8px 12px;display:flex;align-items:flex-end;gap:8px;flex-shrink:0;border-top:1px solid var(--border);}
.compose-wrap{flex:1;background:var(--bg3);border-radius:22px;display:flex;align-items:flex-end;padding:8px 14px;gap:8px;}
#msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;resize:none;max-height:120px;min-height:22px;line-height:1.5;font-family:inherit;}
#msg-input::placeholder{color:var(--text3);}
.attach-btn{color:var(--text2);font-size:20px;cursor:pointer;border:none;background:none;flex-shrink:0;}
.img-preview{display:none;padding:8px 12px 0;}
.img-preview.show{display:flex;align-items:flex-start;gap:8px;}
.img-preview img{max-width:120px;max-height:120px;border-radius:8px;display:block;}
.img-preview .remove-img{width:24px;height:24px;border-radius:50%;border:none;background:var(--bg4);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.send-btn{width:48px;height:48px;border-radius:50%;border:none;background:var(--green);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:12px;}
.empty-chat .ei{font-size:64px;opacity:0.2;}
.mobile-nav{display:none;height:56px;background:var(--bg2);border-top:1px solid var(--border);align-items:center;justify-content:space-around;flex-shrink:0;}
.mob-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--text3);cursor:pointer;padding:6px 0;}
.mob-nav-btn.active{color:var(--green);}
.mob-nav-btn i{font-size:22px;}
.mob-nav-btn span{font-size:10px;font-weight:500;}
.back-btn{display:none;width:36px;height:36px;border-radius:50%;border:none;background:transparent;color:var(--text);cursor:pointer;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
#mobile-list-view{display:none;flex:1;flex-direction:column;overflow:hidden;position:relative;}
#mobile-chat-view{display:none;flex:1;flex-direction:column;overflow:hidden;}
#mob-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:2px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--bg2);border-radius:16px;padding:24px;width:100%;max-width:360px;}
.modal h3{font-size:17px;font-weight:700;margin-bottom:20px;}
.modal-field{margin-bottom:16px;}
.modal-field label{display:block;font-size:12px;color:var(--green);margin-bottom:6px;font-weight:600;}
.modal-field input{width:100%;padding:11px 14px;background:var(--bg3);border:none;border-bottom:2px solid var(--border2);color:var(--text);font-size:14px;outline:none;border-radius:4px 4px 0 0;transition:border-color 0.2s;}
.modal-field input:focus{border-bottom-color:var(--green);}
.modal-field input::placeholder{color:var(--text3);}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{flex:1;padding:12px;border-radius:24px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;}
.btn-confirm{flex:1;padding:12px;border-radius:24px;border:none;background:var(--green);color:#fff;font-size:14px;font-weight:600;cursor:pointer;}
.call-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.call-avatar{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;color:#fff;margin-bottom:8px;}
.call-controls{display:flex;gap:24px;margin-top:32px;}
.call-ctrl{width:60px;height:60px;border-radius:50%;border:none;background:var(--bg3);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;}
.call-ctrl.active{background:var(--bg4);}
.call-end{width:68px;height:68px;border-radius:50%;border:none;background:var(--red);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;}
.dialpad-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:150;align-items:flex-end;justify-content:center;}
.dialpad-sheet{background:var(--bg2);border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:400px;}
.dialpad-input{font-size:28px;font-family:monospace;text-align:center;padding:12px;letter-spacing:4px;color:var(--text);min-height:52px;margin-bottom:16px;}
.dialpad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.dp-btn{padding:16px;border:none;background:var(--bg3);border-radius:12px;font-size:20px;font-weight:600;cursor:pointer;color:var(--text);transition:background 0.15s;}
.dp-btn:hover{background:var(--bg4);}
.dp-btn sub{font-size:10px;color:var(--text3);display:block;font-weight:400;}
.dp-actions{display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.dp-call-btn{width:68px;height:68px;border-radius:50%;border:none;background:var(--green);color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dp-del-btn{width:52px;height:52px;border-radius:50%;border:none;background:var(--bg3);color:var(--text2);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.incoming-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:250;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.incoming-actions{display:flex;gap:48px;margin-top:16px;}
.btn-answer{width:68px;height:68px;border-radius:50%;border:none;background:var(--green);color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-reject{width:68px;height:68px;border-radius:50%;border:none;background:var(--red);color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333333;border-radius:24px;padding:10px 20px;font-size:13px;color:#fff;z-index:300;align-items:center;gap:8px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.25);}
@media(max-width:768px){.sidebar{display:none;}.chat-area{display:none;}.mobile-nav{display:flex;}.back-btn{display:flex;}#mobile-list-view{display:flex;}#app-screen .app-body{overflow:hidden;}#mobile-list-view>.sidebar-tabs{display:none;}}
@media(min-width:769px){.mobile-nav{display:none;}#mobile-list-view{display:none;}#mobile-chat-view{display:none;}}
</style>
</head>
<body>
<div id="loading-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:1000;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
  <div class="logo-circle" style="width:56px;height:56px;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></div>
  <div style="color:var(--text2);font-size:14px;">加载中...</div>
</div>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-circle"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></div>
      <h1>VC美国电话</h1>
    </div>
    <div id="login-error" class="login-error"></div>
    <div class="field-group"><label>登录邮箱</label><input type="email" id="l-user" placeholder="your@email.com" autocomplete="username"></div>
    <div class="field-group"><label>密码</label><input type="password" id="l-pass" placeholder="密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">登录</button>
  </div>
</div>
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-avatar" id="user-avatar">?</div>
    <span class="topbar-title">VC美国电话</span>
    <select class="did-pill" id="did-selector" onchange="onDIDChange()"></select>
    <div style="display:flex;gap:4px;">
      <button class="icon-btn" onclick="doLogout()" title="退出登录"><i class="ti ti-logout"></i></button>
    </div>
  </div>
  <div class="app-body">
    <div class="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" id="tab-chats" onclick="switchTab('chats')">💬 聊天</button>
        <button class="sidebar-tab" id="tab-contacts" onclick="switchTab('contacts')">👥 联系人</button>
        <button class="sidebar-tab" id="tab-calls" onclick="switchTab('calls')">📞 通话</button>
      </div>
      <div id="panel-chats" style="display:flex;flex-direction:column;flex:1;overflow:hidden;position:relative;">
        <div class="sidebar-search"><input type="text" placeholder="搜索对话..." oninput="filterThreads(this.value)"></div>
        <div class="list-container" id="thread-list"><div style="padding:40px;text-align:center;color:var(--text3)">加载中...</div></div>
        <button class="fab" onclick="openNewChat()"><i class="ti ti-message-plus"></i></button>
      </div>
      <div id="panel-contacts" style="display:none;flex-direction:column;flex:1;overflow:hidden;position:relative;">
        <div class="sidebar-search"><input type="text" placeholder="搜索联系人..." oninput="filterContacts(this.value)"></div>
        <div class="list-container" id="contacts-list"></div>
        <button class="fab" onclick="openAddContact()"><i class="ti ti-user-plus"></i></button>
      </div>
      <div id="panel-calls" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
        <div style="padding:16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;">
          <div style="font-size:24px;font-family:monospace;text-align:center;padding:10px;letter-spacing:4px;color:var(--text);min-height:46px;background:var(--bg3);border-radius:10px;margin-bottom:12px;" id="dp-input-desk">&#8203;</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;">
            <button class="dp-btn" onclick="dpKey('1')">1</button>
            <button class="dp-btn" onclick="dpKey('2')">2<sub style="font-size:9px;color:var(--text3);display:block;font-weight:400">ABC</sub></button>
            <button class="dp-btn" onclick="dpKey('3')">3<sub style="font-size:9px;color:var(--text3);display:block;font-weight:400">DEF</sub></button>
            <button class="dp-btn" onclick="dpKey('4')">4<sub style="font-size:9px;color:var(--text3);display:block;font-weight:400">GHI</sub></button>
            <button class="dp-btn" onclick="dpKey('5')">5<sub style="font-size:9px;color:var(--text3);display:block;font-weight:400">JKL</sub></button>
            <button class="dp-btn" onclick="dpKey('6')">6<sub style="font-size:9px;color:var(--text3);display:block;font-weight:400">MNO</sub></button>
            <button class="dp-btn" onclick="dpKey('7')">7<sub style="font-size:9px;color:var(--text3);display:block;font-weight:400">PQRS</sub></button>
            <button class="dp-btn" onclick="dpKey('8')">8<sub style="font-size:9px;color:var(--text3);display:block;font-weight:400">TUV</sub></button>
            <button class="dp-btn" onclick="dpKey('9')">9<sub style="font-size:9px;color:var(--text3);display:block;font-weight:400">WXYZ</sub></button>
            <button class="dp-btn" onclick="dpKey('*')">*</button>
            <button class="dp-btn" onclick="dpKey('0')">0</button>
            <button class="dp-btn" onclick="dpKey('#')">#</button>
          </div>

<script>
const API='https://voipms-app.onrender.com';
let AUTH=null,currentDID='',currentThread=null,allThreads=[],editingIdx=-1;
let pendingImageBase64=null,pendingImageUrl=null;
let contacts=JSON.parse(localStorage.getItem('vc_contacts')||'[]');
async function loadContacts(){
  try{
    const r=await fetch(API+'/api/contacts/list',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:AUTH.username,password:AUTH.password})});
    const data=await r.json();
    if(data.success&&Array.isArray(data.contacts)){
      contacts=data.contacts;
      localStorage.setItem('vc_contacts',JSON.stringify(contacts));
      renderContacts();
      renderThreadList(allThreads);
    }
  }catch(e){}
}
const isMobile=()=>window.innerWidth<=768;
function getColor(s){return '#07c160';}
function ini(n){return(n||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function norm10(s){const d=(s||'').replace(/\D/g,'');return d.length===11&&d[0]==='1'?d.slice(1):d;}
function getContactName(num){const c=contacts.find(c=>norm10(c.num)===norm10(num));return c?c.name:num;}
function getContactNote(num){const c=contacts.find(c=>norm10(c.num)===norm10(num));return c&&c.note?c.note:'';}
function fmtNum(num){if(!num||num.length<10)return num;const n=num.replace(/\D/g,'');return '+1 ('+n.slice(0,3)+') '+n.slice(3,6)+'-'+n.slice(6);}

async function mergeMMS(msgs,contact){
  try{
    const r=await fetch(API+'/api/mms/list',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:AUTH.username,password:AUTH.password,did:currentDID})});
    const data=await r.json();
    if(!data.sms)return msgs;
    const mmsForContact=data.sms.filter(m=>norm10(m.contact)===norm10(contact)&&m.col_media1);
    const merged=[...msgs,...mmsForContact];
    const seen=new Set();
    const dedup=merged.filter(m=>{if(seen.has(m.id))return false;seen.add(m.id);return true;});
    return dedup.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  }catch(e){return msgs;}
}

// AUTO LOGIN
(function(){
  const saved=localStorage.getItem('vc_auth');
  if(saved){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('loading-screen').style.display='flex';
  }
})();
window.addEventListener('load',()=>{
  const saved=localStorage.getItem('vc_auth');
  if(saved){
    try{
      const a=JSON.parse(saved);
      document.getElementById('l-user').value=a.username;
      document.getElementById('l-pass').value=a.password;
      AUTH=a;
      autoLogin(a);
    }catch(e){localStorage.removeItem('vc_auth');document.getElementById('loading-screen').style.display='none';document.getElementById('login-screen').style.display='flex';}
  }
});

async function autoLogin(a){
  try{
    const r=await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(a)});
    const data=await r.json();
    if(data.success){
      document.getElementById('loading-screen').style.display='none';
      setupApp(a,data.dids||[]);
    }else{
      localStorage.removeItem('vc_auth');
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('login-screen').style.display='flex';
    }
  }catch(e){
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('login-screen').style.display='flex';
  }
}

async function doLogin(){
  const btn=document.getElementById('login-btn');
  const errEl=document.getElementById('login-error');
  errEl.style.display='none';
  const username=document.getElementById('l-user').value.trim();
  const password=document.getElementById('l-pass').value;
  if(!username||!password){showErr('请填写邮箱和密码');return;}
  btn.disabled=true;btn.textContent='登录中...';
  try{
    const r=await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data=await r.json();
    if(data.success){
      AUTH={username,password};
      localStorage.setItem('vc_auth',JSON.stringify(AUTH));
      setupApp(AUTH,data.dids||[]);
      showToast('登录成功','success');
    }else{showErr(data.error||'用户名或密码错误');}
  }catch(e){showErr('无法连接服务器');}
  btn.disabled=false;btn.textContent='登录';
}

function setupApp(auth,dids){
  AUTH=auth;
  const sel=document.getElementById('did-selector');
  sel.innerHTML='';
  dids.forEach(d=>{const o=document.createElement('option');o.value=d.did;o.textContent='+1('+d.did.slice(0,3)+')'+d.did.slice(3,6)+'-'+d.did.slice(6);sel.appendChild(o);});
  if(dids.length>0)currentDID=dids[0].did;
  document.getElementById('user-avatar').textContent=auth.username[0].toUpperCase();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  loadThreads();
  renderContacts();
  loadContacts();
  loadCallLog();
  setTimeout(initSIP, 500);
}

function showErr(msg){const el=document.getElementById('login-error');el.textContent=msg;el.style.display='block';}

function doLogout(){
  if(!confirm('确定要退出登录吗？'))return;
  AUTH=null;currentDID='';currentThread=null;
  localStorage.removeItem('vc_auth');
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

function onDIDChange(){currentDID=document.getElementById('did-selector').value;loadThreads();setTimeout(initSIP,300);}

function switchTab(tab){
  ['chats','contacts','calls'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    document.getElementById('panel-'+t).style.display=t===tab?'flex':'none';
  });
  if(tab==='calls')loadCallLog();
  if(tab==='contacts')renderContacts();
}

function switchMobTab(tab){
  ['chats','contacts','calls'].forEach(t=>{
    document.getElementById('mob-tab-'+t).classList.toggle('active',t===tab);
    document.getElementById('mob-panel-'+t).style.display=t===tab?'flex':'none';
  });
  if(tab==='calls')loadCallLog();
  if(tab==='contacts')renderContacts();
}

function switchMobileView(v){
  ['chats','contacts','calls','new'].forEach(n=>{const b=document.getElementById('mob-nav-'+n);if(b)b.classList.remove('active');});
  const nb=document.getElementById('mob-nav-'+v);if(nb)nb.classList.add('active');
  document.getElementById('mobile-list-view').style.display='flex';
  document.getElementById('mobile-chat-view').style.display='none';

function fmtTime(dateStr){
  if(!dateStr)return'';
  const d=new Date(dateStr),now=new Date();
  const diff=now-d;
  if(diff<86400000&&d.getDate()===now.getDate())return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  if(diff<604800000)return['日','一','二','三','四','五','六'][d.getDay()]&&'周'+['日','一','二','三','四','五','六'][d.getDay()];
  return(d.getMonth()+1)+'/'+(d.getDate());
}

function fmtDayLabel(dateStr){
  if(!dateStr)return'';
  const d=new Date(dateStr),now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const target=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=(today-target)/86400000;
  if(diff===0)return'今天';
  if(diff===1)return'昨天';
  if(diff<7)return['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
}

function getSipUser() {

function initSIP() {
  const sipUser = getSipUser();
  if (!sipUser) { console.log('无对应SIP子账号'); return; }
  if (ua) { try { ua.stop(); } catch(e){} ua = null; }
  const socket = new JsSIP.WebSocketInterface(WSS_SERVER);
  const config = {
    sockets: [socket],
    uri: 'sip:' + sipUser + '@' + SIP_DOMAIN,
    password: SIP_PASSWORD,
    register: true,
    register_expires: 300,
    connection_recovery_min_interval: 2,
    connection_recovery_max_interval: 30,
  };
  ua = new JsSIP.UA(config);
  ua.on('registered', () => { console.log('SIP已注册:', sipUser); showToast('通话就绪', 'success'); });
  ua.on('registrationFailed', (e) => { console.log('SIP注册失败:', e.cause); });
  ua.on('newRTCSession', (e) => {
    if (e.originator === 'remote') handleIncoming(e.session);
  });
  ua.start();
}

function handleIncoming(session) {
  currentSession = session;
  const callerNum = (session.remote_identity.uri.user || '未知号码').replace(/^\+1/, '');
  const callerName = getContactName(callerNum) || callerNum;
  document.getElementById('inc-av').textContent = ini(callerName);
  document.getElementById('inc-name').textContent = callerName;
  document.getElementById('inc-num').textContent = '+1' + callerNum;
  document.getElementById('incoming-overlay').style.display = 'flex';
  session.on('failed', () => { document.getElementById('incoming-overlay').style.display = 'none'; currentSession = null; });
  session.on('ended', () => { document.getElementById('incoming-overlay').style.display = 'none'; endCallUI(); });
}

function answerCall() {
  if (!currentSession) return;
  document.getElementById('incoming-overlay').style.display = 'none';
  const callerNum = (currentSession.remote_identity.uri.user || '').replace(/^\+1/, '');
  const callerName = getContactName(callerNum) || callerNum;
  showCallUI(callerName, '通话中');
  currentSession.answer({ mediaConstraints: { audio: true, video: false } });
  currentSession.connection.addEventListener('addstream', (e) => {
    const audio = document.getElementById('remote-audio');
    audio.srcObject = e.streams[0];
    audio.play().catch(()=>{});
  });
  currentSession.on('ended', () => endCallUI());
  currentSession.on('failed', () => endCallUI());
  startCallTimer();
}

function rejectCall() {
  if (currentSession) { currentSession.terminate(); currentSession = null; }
  document.getElementById('incoming-overlay').style.display = 'none';
}

function startCallTo(name, num) {
  if (!ua || !ua.isRegistered()) { showToast('SIP未连接，请稍候重试', 'error'); return; }
  const dst = num.replace(/\D/g, '').replace(/^1/, '');
  const target = 'sip:1' + dst + '@' + SIP_DOMAIN;
  showCallUI(name || dst, '正在拨号...');
  const options = {
    mediaConstraints: { audio: true, video: false },
    pcConfig: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
  };
  currentSession = ua.call(target, options);
  currentSession.on('progress', () => setCallStatus('正在拨号...'));
  currentSession.on('accepted', () => { setCallStatus('通话中'); startCallTimer(); });
  currentSession.on('confirmed', () => { setCallStatus('通话中'); });
  currentSession.on('ended', () => endCallUI());
  currentSession.on('failed', (e) => { showToast('通话失败: ' + (e.cause||''), 'error'); endCallUI(); });
  currentSession.connection.addEventListener('addstream', (e) => {
    const audio = document.getElementById('remote-audio');
    audio.srcObject = e.streams[0];
    audio.play().catch(()=>{});
  });
}

function startCall() { if (!currentThread) return; startCallTo(getContactName(currentThread.contact), currentThread.contact); }

function showCallUI(name, status) {
  const color = getColor(name);
  document.getElementById('call-av').textContent = ini(name);
  document.getElementById('call-av').style.background = color;
  document.getElementById('call-name-disp').textContent = name;
  document.getElementById('call-status').textContent = status;
  document.getElementById('call-timer').textContent = '';
  document.getElementById('call-overlay').style.display = 'flex';
  callSec = 0; isMuted = false;
  document.getElementById('mute-btn').classList.remove('active');
}

function setCallStatus(s) { document.getElementById('call-status').textContent = s; }

function startCallTimer() {
  clearInterval(callTimerInterval);
  callSec = 0;
  callTimerInterval = setInterval(() => {
    callSec++;
    const m = Math.floor(callSec / 60).toString().padStart(2, '0');
    const s = (callSec % 60).toString().padStart(2, '0');
    document.getElementById('call-timer').textContent = m + ':' + s;
  }, 1000);
}

function endCallUI() {
  clearInterval(callTimerInterval);
  document.getElementById('call-overlay').style.display = 'none';
  currentSession = null; isMuted = false;
  loadCallLog();
}

function endCall() {
  if (currentSession) {
    try { currentSession.terminate(); } catch(e) {}
  }
  endCallUI();
}

function toggleMute() {
  if (!currentSession) return;
  isMuted = !isMuted;
  if (isMuted) { currentSession.mute(); } else { currentSession.unmute(); }
  document.getElementById('mute-btn').classList.toggle('active', isMuted);
}

// 拨号盘
let dpVisible = false;
function openDialpad() { dpNumber = ''; updateDpDisplay(); document.getElementById('dialpad-overlay').style.display = 'flex'; }
function closeDialpad() { document.getElementById('dialpad-overlay').style.display = 'none'; }
function dpKey(k) {
  if (dpNumber.length < 15) { dpNumber += k; updateDpDisplay(); updateDpContacts(); }
}
function dpDel() { dpNumber = dpNumber.slice(0, -1); updateDpDisplay(); updateDpContacts(); }
function updateDpDisplay() {
  const v = dpNumber || '\u200b';
  ['dp-input-desk','dp-input-mob'].forEach(id => { const el = document.getElementById(id); if(el) el.textContent = v; });
}
function showMobDialpad() {
  dpVisible = true; dpNumber = ''; updateDpDisplay(); updateDpContacts();
  document.getElementById('mob-calls-list').style.display = 'none';
  document.getElementById('mob-dialpad-section').style.display = 'flex';
  document.getElementById('mob-dp-fab').style.display = 'none';
}
function hideMobDialpad() {
  dpVisible = false; dpNumber = ''; updateDpDisplay();
  document.getElementById('mob-calls-list').style.display = 'block';
  document.getElementById('mob-dialpad-section').style.display = 'none';
  document.getElementById('mob-dp-fab').style.display = 'flex';
}
function updateDpContacts() {
  const el = document.getElementById('mob-dp-contacts');
  if (!el) return;
  if (!dpNumber) { el.innerHTML = ''; return; }
  const matches = contacts.filter(c => c.num.includes(dpNumber) || (c.name && c.name.toLowerCase().includes(dpNumber.toLowerCase()))).slice(0, 4);
  el.innerHTML = matches.map(c => `<div onclick="dpSelectContact('${c.name}','${c.num}')" style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;">
    <div style="width:40px;height:40px;border-radius:50%;background:${getColor(c.name)};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;">${ini(c.name)}</div>
    <div><div style="font-size:14px;font-weight:500;">${esc(c.name)}</div><div style="font-size:12px;color:var(--text3);font-family:monospace;">${c.num}</div></div>
  </div>`).join('');
}
function dpSelectContact(name, num) { dpNumber = num; updateDpDisplay(); }
function dpCall() {
  if (!dpNumber) return;
  if (dpVisible) hideMobDialpad();
  closeDialpad();
  const name = getContactName(dpNumber) || dpNumber;
  startCallTo(name, dpNumber);
}

function closeModal(id){document.getElementById(id).style.display='none';}
document.addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay'))e.target.style.display='none';});

async function handleFileSelect(e){
  const file=e.target.files[0];
  e.target.value='';
  if(!file||!currentThread)return;
  if(!file.type.startsWith('image/')){showToast('仅支持图片','error');return;}
  if(file.size>5*1024*1024){showToast('图片不能超过5MB','error');return;}
  try{
    const base64=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(',')[1]);
      r.onerror=rej;
      r.readAsDataURL(file);
    });
    pendingImageBase64=base64;
    if(pendingImageUrl)URL.revokeObjectURL(pendingImageUrl);
    pendingImageUrl=URL.createObjectURL(file);
    ['img-preview','mob-img-preview'].forEach(id=>{
      const el=document.getElementById(id);if(!el)return;
      el.classList.add('show');
      const img=el.querySelector('img');if(img)img.src=pendingImageUrl;
    });
  }catch(err){showToast('图片读取失败','error');}
}

let toastTimer=null;
function showToast(msg,type){
  const t=document.getElementById('toast');
  const icon=document.getElementById('toast-icon');
  document.getElementById('toast-msg').textContent=msg;
  const colors={success:'var(--green)',error:'var(--red)',info:'#ccc',warn:'var(--amber)'};
  const icons={success:'ti-circle-check',error:'ti-circle-x',info:'ti-info-circle',warn:'ti-alert-triangle'};
  icon.className='ti '+(icons[type]||'ti-info-circle');
  icon.style.color=colors[type]||'var(--green)';
  t.style.display='flex';
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.style.display='none',3000);
}

window.addEventListener('resize',()=>{
  if(!AUTH)return;
  if(!isMobile()){document.getElementById('mobile-list-view').style.display='none';document.getElementById('mobile-chat-view').style.display='none';}
});

// AUTO POLL: 每5秒自动检查新消息
setInterval(async ()=>{
  if(!AUTH||!currentDID)return;
  if(currentThread){
    try{
      const r=await fetch(API+'/api/sms/list',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:AUTH.username,password:AUTH.password,did:currentDID,contact:norm10(currentThread.contact)})});
      const data=await r.json();
      if(data.sms){
        const msgs=data.sms.sort((a,b)=>a.date.localeCompare(b.date));
        if(JSON.stringify(msgs)!==JSON.stringify(currentThread.msgs)){
          const merged=await mergeMMS(msgs,currentThread.contact);
          currentThread.msgs=merged;
          renderMessages(isMobile()?'mob-messages':'messages',merged);
        }
      }
    }catch(e){}
  }else{
    loadThreads();
  }
},5000);
</script>
