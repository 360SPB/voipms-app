<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VoIP Connect</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f0f13;--bg2:#17171e;--bg3:#1e1e28;--bg4:#25252f;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f5;--text2:#9898aa;--text3:#5a5a6e;
  --accent:#6c63ff;--accent2:#9d97ff;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;}

/* ── 登录页 ── */
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;padding:16px;}
.login-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:20px;padding:32px 28px;width:100%;max-width:400px;}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.logo-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.login-logo h1{font-size:20px;font-weight:600;}
.login-logo small{font-size:11px;color:var(--text3);display:block;}
.tab-switcher{display:flex;background:var(--bg3);border-radius:var(--radius-sm);padding:3px;margin-bottom:20px;}
.tab-btn{flex:1;padding:8px;border:none;background:transparent;color:var(--text2);border-radius:6px;cursor:pointer;font-size:13px;transition:all 0.2s;}
.tab-btn.active{background:var(--bg4);color:var(--text);}
.field-group{margin-bottom:14px;}
.field-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.field-group input,.field-group select{width:100%;padding:10px 14px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
.field-group input:focus{border-color:var(--accent);}
.field-group input::placeholder{color:var(--text3);}
.btn-primary{width:100%;padding:13px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity 0.2s;}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
.login-note{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;line-height:1.6;}
.login-error{background:rgba(239,68,68,0.1);border:0.5px solid var(--red);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none;}

/* ── 主界面 ── */
#app-screen{display:none;height:100vh;height:100dvh;flex-direction:column;}

/* 顶栏 */
.topbar{height:56px;background:var(--bg2);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.topbar-logo{display:flex;align-items:center;gap:8px;}
.topbar-logo span{font-weight:600;font-size:15px;}
.did-selector{background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--accent2);outline:none;cursor:pointer;max-width:160px;-webkit-appearance:none;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.icon-btn{width:34px;height:34px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:background 0.15s;}
.icon-btn:hover{background:var(--bg3);color:var(--text);}

/* ── 桌面布局 ── */
.desktop-layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:60px;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;flex-shrink:0;}
.nav-btn{width:40px;height:40px;border-radius:10px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.15s;position:relative;}
.nav-btn:hover{background:var(--bg3);color:var(--text2);}
.nav-btn.active{background:rgba(108,99,255,0.15);color:var(--accent2);}
.nav-spacer{flex:1;}
.panel{width:300px;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}

/* ── 手机底部导航 ── */
.mobile-nav{display:none;height:60px;background:var(--bg2);border-top:0.5px solid var(--border);flex-shrink:0;align-items:center;justify-content:space-around;padding:0 8px;padding-bottom:env(safe-area-inset-bottom);}
.mobile-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--text3);cursor:pointer;padding:6px 0;border-radius:8px;transition:color 0.15s;position:relative;}
.mobile-nav-btn.active{color:var(--accent2);}
.mobile-nav-btn i{font-size:22px;}
.mobile-nav-btn span{font-size:10px;font-weight:500;}
.mob-badge{position:absolute;top:4px;right:calc(50% - 18px);width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--bg2);display:none;}

/* ── 公共面板头 ── */
.panel-header{padding:16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.panel-header h2{font-size:15px;font-weight:600;}
.compose-btn{margin-left:auto;width:30px;height:30px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;}
.search-bar{padding:10px 14px;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.search-bar input{width:100%;padding:8px 14px;background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;color:var(--text);font-size:13px;outline:none;}
.search-bar input::placeholder{color:var(--text3);}

/* ── 对话列表 ── */
.thread-list{flex:1;overflow-y:auto;}
.thread-list::-webkit-scrollbar{width:3px;}
.thread-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
.thread-item{padding:12px 16px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;border-bottom:0.5px solid var(--border);transition:background 0.1s;}
.thread-item:hover,.thread-item:active{background:var(--bg3);}
.thread-item.active{background:rgba(108,99,255,0.1);}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--accent2);flex-shrink:0;}
.thread-info{flex:1;min-width:0;}
.thread-name{font-size:13px;font-weight:500;display:flex;justify-content:space-between;margin-bottom:3px;}
.thread-time{font-size:11px;color:var(--text3);flex-shrink:0;}
.thread-preview{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;}
.unread-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;flex-shrink:0;}

/* ── 聊天区域 ── */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg2);flex-shrink:0;}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:fadeIn 0.2s ease;}
.msg-row.sent{flex-direction:row-reverse;}
.msg-bubble{max-width:72%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;}
.msg-row.recv .msg-bubble{background:var(--bg3);border-bottom-left-radius:4px;color:var(--text);}
.msg-row.sent .msg-bubble{background:var(--accent);border-bottom-right-radius:4px;color:#fff;}
.msg-time{font-size:10px;color:var(--text3);margin-top:2px;padding:0 4px;}
.msg-row.sent .msg-time{text-align:right;}
.msg-img{max-width:200px;border-radius:10px;cursor:pointer;}
.day-div{text-align:center;font-size:11px;color:var(--text3);padding:8px 0;display:flex;align-items:center;gap:8px;}
.day-div::before,.day-div::after{content:'';flex:1;height:0.5px;background:var(--border);}

/* ── 输入栏 ── */
.compose-bar{padding:10px 12px;border-top:0.5px solid var(--border);background:var(--bg2);flex-shrink:0;padding-bottom:calc(10px + env(safe-area-inset-bottom));}
.compose-inner{display:flex;align-items:flex-end;gap:8px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:22px;padding:8px 10px;}
.compose-inner:focus-within{border-color:var(--accent);}
#msg-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;resize:none;max-height:120px;min-height:24px;line-height:1.5;font-family:inherit;}
#msg-input::placeholder{color:var(--text3);}
.send-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:opacity 0.15s;}
.send-btn:hover{opacity:0.85;}

/* ── 拨号盘 ── */
.dialpad-view{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;}
#dial-display{font-size:36px;font-weight:400;color:var(--text);text-align:center;min-height:54px;margin-bottom:24px;letter-spacing:4px;font-family:monospace;}
.dial-grid{display:grid;grid-template-columns:repeat(3,72px);gap:14px;margin-bottom:28px;}
.dial-key{width:72px;height:72px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background 0.15s;-webkit-tap-highlight-color:transparent;}
.dial-key:active{background:var(--accent);}
.dial-key .num{font-size:24px;font-weight:400;line-height:1;}
.dial-key .sub{font-size:9px;letter-spacing:2px;color:var(--text3);margin-top:2px;}
.dial-actions{display:flex;align-items:center;gap:24px;}
.call-btn{width:68px;height:68px;border-radius:50%;border:none;background:var(--green);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;}
.del-btn{width:46px;height:46px;border-radius:50%;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;}

/* ── 联系人/通话记录 ── */
.list-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.list-scroll{flex:1;overflow-y:auto;padding:0 16px;}
.list-scroll::-webkit-scrollbar{width:3px;}
.contact-letter{font-size:11px;font-weight:600;color:var(--text3);padding:12px 0 6px;letter-spacing:1px;}
.contact-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer;}
.contact-row:active{opacity:0.7;}
.contact-info{flex:1;min-width:0;}
.contact-name{font-size:14px;font-weight:500;}
.contact-num{font-size:12px;color:var(--text2);font-family:monospace;}
.contact-actions{display:flex;gap:6px;}
.action-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;}

/* ── 通话弹窗 ── */
.call-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:100;align-items:center;justify-content:center;}
.call-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:24px;padding:40px 50px;text-align:center;width:90%;max-width:320px;}
.call-av{width:76px;height:76px;border-radius:50%;background:var(--bg4);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:600;color:var(--accent2);}
.call-controls{display:flex;gap:16px;justify-content:center;margin-top:28px;}
.ctrl-btn{width:54px;height:54px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;}
.ctrl-btn.active{background:var(--accent);border-color:var(--accent);}
.end-btn{width:62px;height:62px;border-radius:50%;border:none;background:var(--red);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;}

/* ── 吐司提示 ── */
.toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;padding:10px 18px;font-size:13px;color:var(--text);z-index:200;align-items:center;gap:8px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.4);}

/* ── 手机版聊天返回 ── */
.back-btn{display:none;width:34px;height:34px;border-radius:50%;border:none;background:transparent;color:var(--text);cursor:pointer;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}

/* ── 空状态 ── */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:12px;}
.empty-state i{font-size:44px;}
.empty-state p{font-size:14px;}
.empty-state button{margin-top:4px;padding:10px 22px;border-radius:22px;border:none;background:var(--accent);color:#fff;font-size:14px;cursor:pointer;}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ══ 响应式断点 ══ */
@media(max-width:768px){
  .sidebar{display:none;}
  .panel{display:none;width:100%;}
  .desktop-layout{flex-direction:column;}
  .mobile-nav{display:flex;}
  .back-btn{display:flex;}
  .chat-area{display:none;}
  .dialpad-view{display:none;}
  .list-view{display:none;}
  #mobile-list-view{display:flex;flex:1;flex-direction:column;overflow:hidden;}
}
@media(min-width:769px){
  .mobile-nav{display:none;}
  .sidebar{display:flex;}
  #mobile-list-view{display:none;}
}
</style>
<body>
<!-- 登录页 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">📱</div>
      <div><h1>VC美国电话</h1></div>
    </div>
    <div id="login-error" class="login-error"></div>
    <div class="field-group"><label>登录邮箱</label><input type="email" id="l-user" placeholder="your@email.com" autocomplete="username"></div>
    <div class="field-group"><label>登录密码</label><input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">登录</button>
  </div>
</div>
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">
      <div style="width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px">📱</div>
      <span>VoIP Connect</span>
    </div>
    <select class="did-selector" id="did-selector" onchange="onDIDChange()"></select>
    <div class="status-dot"></div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="logout()"><i class="ti ti-logout"></i></button>
    </div>
  </div>
  <div class="desktop-layout">
    <div class="sidebar">
      <button class="nav-btn active" id="nav-messages" onclick="switchView('messages')"><i class="ti ti-message-2"></i></button>
      <button class="nav-btn" id="nav-dialpad" onclick="switchView('dialpad')"><i class="ti ti-dialpad"></i></button>
      <button class="nav-btn" id="nav-contacts" onclick="switchView('contacts')"><i class="ti ti-users"></i></button>
      <button class="nav-btn" id="nav-recents" onclick="switchView('recents')"><i class="ti ti-clock"></i></button>
      <div class="nav-spacer"></div>
      <div id="user-av-desk" style="width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff">?</div>
    </div>
    <div class="panel" id="panel-threads">
      <div class="panel-header">
        <h2>消息</h2>
        <button class="compose-btn" onclick="newConversation()"><i class="ti ti-pencil-plus"></i></button>
      </div>
      <div class="search-bar"><input type="text" placeholder="搜索对话..." oninput="filterThreads(this.value)"></div>
      <div class="thread-list" id="thread-list-desk"><div style="padding:30px;text-align:center;color:var(--text3)">加载中...</div></div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      <div id="view-messages" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <div id="chat-container" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
          <div class="chat-header">
            <button class="back-btn" onclick="mobileBack()"><i class="ti ti-arrow-left"></i></button>
            <div class="avatar" id="chat-avatar">?</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:15px;font-weight:600;" id="chat-name">-</div>
              <div style="font-size:12px;color:var(--text2);font-family:monospace;" id="chat-num">-</div>
            </div>
            <div style="display:flex;gap:4px;">
              <button class="icon-btn" onclick="startCall()"><i class="ti ti-phone"></i></button>
              <button class="icon-btn" onclick="refreshMessages()"><i class="ti ti-refresh"></i></button>
            </div>
          </div>
          <div class="messages" id="messages"></div>
          <div class="compose-bar">
            <div class="compose-inner">
              <button class="icon-btn" onclick="document.getElementById('file-input').click()" style="width:30px;height:30px;font-size:16px;flex-shrink:0;"><i class="ti ti-photo"></i></button>
              <textarea id="msg-input" rows="1" placeholder="短信..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
              <button class="send-btn" onclick="sendMessage()"><i class="ti ti-send"></i></button>
            </div>
          </div>
        </div>
        <div class="empty-state" id="empty-state">
          <i class="ti ti-message-2"></i><p>选择对话或新建一个</p>
          <button onclick="newConversation()">新建对话</button>
        </div>
      </div>
      <div id="view-dialpad" class="dialpad-view" style="display:none;">
        <div id="dial-display">&#8203;</div>
        <div class="dial-grid">
          <button class="dial-key" onclick="dialPress('1')"><span class="num">1</span></button>
          <button class="dial-key" onclick="dialPress('2')"><span class="num">2</span><span class="sub">ABC</span></button>
          <button class="dial-key" onclick="dialPress('3')"><span class="num">3</span><span class="sub">DEF</span></button>
          <button class="dial-key" onclick="dialPress('4')"><span class="num">4</span><span class="sub">GHI</span></button>
          <button class="dial-key" onclick="dialPress('5')"><span class="num">5</span><span class="sub">JKL</span></button>
          <button class="dial-key" onclick="dialPress('6')"><span class="num">6</span><span class="sub">MNO</span></button>
          <button class="dial-key" onclick="dialPress('7')"><span class="num">7</span><span class="sub">PQRS</span></button>
          <button class="dial-key" onclick="dialPress('8')"><span class="num">8</span><span class="sub">TUV</span></button>
          <button class="dial-key" onclick="dialPress('9')"><span class="num">9</span><span class="sub">WXYZ</span></button>
          <button class="dial-key" onclick="dialPress('*')"><span class="num">*</span></button>
          <button class="dial-key" onclick="dialPress('0')"><span class="num">0</span><span class="sub">+</span></button>
          <button class="dial-key" onclick="dialPress('#')"><span class="num">#</span></button>
        </div>
        <div class="dial-actions">
          <button class="del-btn" onclick="dialDelete()"><i class="ti ti-backspace"></i></button>
          <button class="call-btn" onclick="startCallDial()"><i class="ti ti-phone"></i></button>
          <button class="del-btn" onclick="dialToSMS()"><i class="ti ti-message"></i></button>
        </div>
      </div>
      <div id="view-contacts" class="list-view" style="display:none;">
        <div class="panel-header"><h2>联系人</h2><button class="compose-btn" onclick="addContact()"><i class="ti ti-plus"></i></button></div>
        <div class="search-bar"><input type="text" placeholder="搜索联系人..." oninput="filterContacts(this.value)"></div>
        <div class="list-scroll" id="contacts-list"></div>
      </div>
      <div id="view-recents" class="list-view" style="display:none;">
        <div class="panel-header"><h2>通话记录</h2></div>
        <div class="list-scroll" id="recents-list"></div>
      </div>
    </div>
  </div>
  <div id="mobile-list-view" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
    <div class="panel-header">
      <h2 id="mobile-panel-title">消息</h2>

<input type="file" id="file-input" accept="image/*,video/*" style="display:none" onchange="handleFileSelect(event)"><script>
const API = 'https://voipms-app.onrender.com';
let AUTH = null;
let currentDID = '';
let currentThread = null;
let contacts = JSON.parse(localStorage.getItem('voip_contacts') || '[]');
let dialNum = '';
let dialNumMob = '';
let callTimer = null;
let callSec = 0;
let pendingMedia = [];
let isMobile = () => window.innerWidth <= 768;
let currentMobileView = 'messages';

// ── 登录 ──────────────────────────────────────────────────────────────────
function switchLoginTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='pwd')||(i===1&&t==='api')));
  document.getElementById('tab-pwd').style.display = t==='pwd'?'':'none';
  document.getElementById('tab-api').style.display = t==='api'?'':'none';
}

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  const isPwd = document.querySelector('.tab-btn.active').textContent.includes('密码');
  const username = isPwd ? document.getElementById('l-user').value.trim() : document.getElementById('l-user2').value.trim();
  const password = isPwd ? document.getElementById('l-pass').value : document.getElementById('l-api').value;
  if (!username || !password) { showErr('请填写用户名和密码'); return; }
  btn.disabled = true; btn.textContent = '登录中...';
  try {
    const r = await fetch(API+'/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
    const data = await r.json();
    if (data.success) {
      AUTH = { username, password };
      const dids = data.dids || [];
      const sel = document.getElementById('did-selector');
      sel.innerHTML = '';
      dids.forEach(d => { const o = document.createElement('option'); o.value = d.did; o.textContent = '+1 ('+d.did.slice(0,3)+') '+d.did.slice(3,6)+'-'+d.did.slice(6); sel.appendChild(o); });
      if (dids.length > 0) currentDID = dids[0].did;
      const av = username[0].toUpperCase();
      document.getElementById('user-av-desk').textContent = av;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'flex';
      if (isMobile()) { switchMobileView('messages'); } else { switchView('messages'); }
      loadThreads();
      showToast('登录成功 ✓', 'success');
    } else {
      showErr(data.error || '登录失败，请检查账号密码');
    }
  } catch(e) { showErr('无法连接服务器，请检查网络'); }
  btn.disabled = false; btn.textContent = '登录';
}

function showErr(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}

function logout() {
  AUTH = null; currentDID = ''; currentThread = null;
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function onDIDChange() {
  currentDID = document.getElementById('did-selector').value;
  currentThread = null;
  loadThreads();
}

// ── 桌面视图切换 ───────────────────────────────────────────────────────────
function switchView(v) {
  ['messages','dialpad','contacts','recents'].forEach(id => {
    const el = document.getElementById('view-'+id);
    const nav = document.getElementById('nav-'+id);
    const panel = document.getElementById('panel-threads');
    if (el) el.style.display = 'none';
    if (nav) nav.classList.remove('active');
    if (panel) panel.style.display = v==='messages'?'flex':'none';
  });
  const vEl = document.getElementById('view-'+v);
  if (vEl) { vEl.style.display = 'flex'; vEl.style.flexDirection = 'column'; }
  const nEl = document.getElementById('nav-'+v);
  if (nEl) nEl.classList.add('active');
  if (v === 'contacts') renderContacts();
  if (v === 'recents') loadCallLog();
}

// ── 手机视图切换 ───────────────────────────────────────────────────────────
function switchMobileView(v) {
  currentMobileView = v;
  document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('mob-nav-'+v);
  if (nb) nb.classList.add('active');
  document.getElementById('mobile-list-view').style.display = 'flex';
  document.getElementById('mobile-chat-view').style.display = 'none';
  const tl = document.getElementById('thread-list-mob');
  const cl = document.getElementById('contacts-list-mob');
  const rl = document.getElementById('recents-list-mob');
  const dl = document.getElementById('dialpad-mob');
  const sb = document.getElementById('mobile-search-bar');
  const cb = document.getElementById('mobile-compose-btn');
  tl.style.display = 'none'; cl.style.display = 'none';
  rl.style.display = 'none'; dl.style.display = 'none';
  sb.style.display = ''; cb.style.display = '';
  const titleMap = { messages:'消息', dialpad:'拨号', contacts:'联系人', recents:'通话记录' };
  document.getElementById('mobile-panel-title').textContent = titleMap[v] || '';
  if (v === 'messages') { tl.style.display = 'flex'; tl.style.flexDirection = 'column'; loadThreads(); }
  if (v === 'dialpad') { dl.style.display = 'flex'; sb.style.display = 'none'; cb.style.display = 'none'; }
  if (v === 'contacts') { cl.style.display = 'block'; renderContactsMob(); }
  if (v === 'recents') { rl.style.display = 'block'; loadCallLogMob(); cb.style.display = 'none'; }
}

function mobileBack() {
  document.getElementById('mobile-chat-view').style.display = 'none';
  document.getElementById('mobile-list-view').style.display = 'flex';
}

// ── 加载对话列表 ───────────────────────────────────────────────────────────
async function loadThreads() {
  if (!AUTH || !currentDID) return;
  try {
    const r = await fetch(API+'/api/sms/conversations', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:AUTH.username, password:AUTH.password, did:currentDID}) });
    const data = await r.json();
    const sms = data.sms || [];
    const map = {};
    sms.forEach(m => {
      const contact = m.type === 'received' ? m.contact : m.contact;
      if (!map[contact]) map[contact] = { contact, msgs:[], lastTime:m.date };
      map[contact].msgs.push(m);
      if (m.date > map[contact].lastTime) map[contact].lastTime = m.date;
    });
    const threads = Object.values(map).sort((a,b) => b.lastTime.localeCompare(a.lastTime));
    renderThreadList('thread-list-desk', threads, false);
    renderThreadList('thread-list-mob', threads, true);
  } catch(e) {
    document.getElementById('thread-list-desk').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3)">加载失败，请刷新</div>';
  }
}

function getContactName(num) {
  const c = contacts.find(c => c.num.replace(/\D/g,'') === num.replace(/\D/g,''));
  return c ? c.name : num;
}

function renderThreadList(elId, threads, mobile) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (threads.length === 0) { el.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text3)">暂无消息</div>'; return; }
  el.innerHTML = '';
  threads.forEach(t => {
    const last = t.msgs[t.msgs.length-1];
    const name = getContactName(t.contact);
    const initials = name[0].toUpperCase();
    const div = document.createElement('div');
    div.className = 'thread-item';
    div.innerHTML = `<div class="avatar">${initials}</div><div class="thread-info"><div class="thread-name"><span>${name}</span><span class="thread-time">${last.date.slice(5,10)}</span></div><div class="thread-preview">${last.type==='sent'?'你: ':''}${last.message.length>30?last.message.slice(0,30)+'…':last.message}</div></div>`;
    div.onclick = () => openThread(t, mobile);
    el.appendChild(div);
  });
}

function filterThreads(q) { loadThreads(); }
function filterThreadsMobile(q) { loadThreads(); }

// ── 打开对话 ───────────────────────────────────────────────────────────────
async function openThread(t, mobile) {
  currentThread = t;
  const name = getContactName(t.contact);
  const initials = name[0].toUpperCase();
  if (mobile || isMobile()) {
    document.getElementById('mobile-list-view').style.display = 'none';
    document.getElementById('mobile-chat-view').style.display = 'flex';
    document.getElementById('mob-chat-avatar').textContent = initials;
    document.getElementById('mob-chat-name').textContent = name;
    document.getElementById('mob-chat-num').textContent = t.contact;
    renderMessages('mob-messages', t.msgs);
  } else {
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('chat-container').style.display = 'flex';
    document.getElementById('chat-avatar').textContent = initials;
    document.getElementById('chat-name').textContent = name;
    document.getElementById('chat-num').textContent = t.contact;
    renderMessages('messages', t.msgs);
  }
  const r = await fetch(API+'/api/sms/list', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:AUTH.username, password:AUTH.password, did:currentDID, contact:t.contact}) });
  const data = await r.json();
  if (data.sms) {
    const msgs = data.sms.sort((a,b) => a.date.localeCompare(b.date));
    renderMessages(mobile||isMobile()?'mob-messages':'messages', msgs);
  }
}

function renderMessages(elId, msgs) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = '';
  msgs.forEach(m => {
    const row = document.createElement('div');
    row.className = 'msg-row ' + (m.type==='sent'?'sent':'recv');
    const time = m.date ? m.date.slice(11,16) : '';
    row.innerHTML = `<div><div class="msg-bubble">${escHtml(m.message)}</div><div class="msg-time">${time}</div></div>`;
    el.appendChild(row);
  });
  el.scrollTop = el.scrollHeight;
}

function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function refreshMessages() {
  if (!currentThread) return;
  const mobile = isMobile();
  showToast('刷新中...', 'info');
  const r = await fetch(API+'/api/sms/list', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:AUTH.username, password:AUTH.password, did:currentDID, contact:currentThread.contact}) });
  const data = await r.json();
  if (data.sms) {
    const msgs = data.sms.sort((a,b) => a.date.localeCompare(b.date));
    renderMessages(mobile?'mob-messages':'messages', msgs);
    showToast('已刷新 ✓', 'success');
  }
}

// ── 发送消息 ───────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!currentThread || !text) return;
  input.value = ''; input.style.height = 'auto';
  await doSend(text, 'messages');
}

async function sendMessageMob() {
  const input = document.getElementById('mob-msg-input');
  const text = input.value.trim();
  if (!currentThread || !text) return;
  input.value = ''; input.style.height = 'auto';
  await doSend(text, 'mob-messages');
}

async function doSend(text, elId) {
  const el = document.getElementById(elId);
  const row = document.createElement('div');
  row.className = 'msg-row sent';
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  row.innerHTML = `<div><div class="msg-bubble">${escHtml(text)}</div><div class="msg-time">${time}</div></div>`;
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
  try {
    const r = await fetch(API+'/api/sms/send', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:AUTH.username, password:AUTH.password, did:currentDID, dst:currentThread.contact, message:text}) });
    const data = await r.json();
    if (data.status === 'success') { showToast('发送成功 ✓', 'success'); }
    else { showToast('发送失败: '+(data.status||'未知错误'), 'error'); }
  } catch(e) { showToast('发送失败，请检查网络', 'error'); }
}

function handleKey(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); } }
function handleKeyMob(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessageMob(); } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

// ── 新建对话 ───────────────────────────────────────────────────────────────
function newConversation() {
  const num = prompt('输入对方电话号码（10位，如6261234567）：');
  if (!num) return;
  const clean = num.replace(/\D/g,'');
  if (clean.length < 10) { showToast('号码格式不正确', 'error'); return; }
  const t = { contact: clean, msgs: [] };
  currentThread = t;
  const name = getContactName(clean);
  if (isMobile()) {
    document.getElementById('mobile-list-view').style.display = 'none';
    document.getElementById('mobile-chat-view').style.display = 'flex';
    document.getElementById('mob-chat-avatar').textContent = name[0].toUpperCase();
    document.getElementById('mob-chat-name').textContent = name;
    document.getElementById('mob-chat-num').textContent = clean;
    document.getElementById('mob-messages').innerHTML = '';
  } else {
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('chat-container').style.display = 'flex';
    document.getElementById('chat-avatar').textContent = name[0].toUpperCase();
    document.getElementById('chat-name').textContent = name;
    document.getElementById('chat-num').textContent = clean;
    document.getElementById('messages').innerHTML = '';
  }
}

// ── 图片/视频 ──────────────────────────────────────────────────────────────
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  showToast('MMS图片/视频已选择，发送功能需VoIP.ms MMS API支持', 'info');
  e.target.value = '';
}

// ── 拨号盘（桌面） ─────────────────────────────────────────────────────────
function dialPress(k) { dialNum+=k; document.getElementById('dial-display').textContent=dialNum; }
function dialDelete() { dialNum=dialNum.slice(0,-1); document.getElementById('dial-display').textContent=dialNum||'\u200B'; }
function dialToSMS() { if(!dialNum)return; currentThread={contact:dialNum,msgs:[]}; switchView('messages'); newConversation(); }
function startCallDial() { if(!dialNum){showToast('请先输入号码','error');return;} startCallTo(dialNum,dialNum); }

// ── 拨号盘（手机） ─────────────────────────────────────────────────────────
function dialPressMob(k) { dialNumMob+=k; document.getElementById('dial-display-mob').textContent=dialNumMob; }
function dialDeleteMob() { dialNumMob=dialNumMob.slice(0,-1); document.getElementById('dial-display-mob').textContent=dialNumMob||'\u200B'; }
function dialToSMSMob() { if(!dialNumMob)return; currentThread={contact:dialNumMob,msgs:[]}; switchMobileView('messages'); }

// ── 通话 ───────────────────────────────────────────────────────────────────
function startCall() {
  if (!currentThread) return;
  const name = getContactName(currentThread.contact);
  startCallTo(name, currentThread.contact);
}

function startCallTo(name, num) {
  document.getElementById('call-av').textContent = name[0].toUpperCase();
  document.getElementById('call-name-disp').textContent = name;
  document.getElementById('call-status').textContent = '正在拨号... (SIP需配置软电话)';
  document.getElementById('call-timer').textContent = '';
  document.getElementById('call-overlay').style.display = 'flex';
  callSec = 0;
  setTimeout(() => {
    document.getElementById('call-status').textContent = '通话中';
    callTimer = setInterval(() => {
      callSec++;
      const m = Math.floor(callSec/60).toString().padStart(2,'0');
      const s = (callSec%60).toString().padStart(2,'0');
      document.getElementById('call-timer').textContent = m+':'+s;
    }, 1000);
  }, 1500);
}

function endCall() {
  clearInterval(callTimer);
  document.getElementById('call-overlay').style.display = 'none';
  showToast('通话已结束', 'info');
}

// ── 联系人（桌面） ─────────────────────────────────────────────────────────
function renderContacts() {
  const el = document.getElementById('contacts-list');
  if (!el) return;
  renderContactsTo(el, false);
}

function renderContactsMob() {
  const el = document.getElementById('contacts-list-mob');
  if (!el) return;
  renderContactsTo(el, true);
}

function renderContactsTo(el, mobile) {
  el.innerHTML = '';
  if (contacts.length === 0) { el.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text3)">暂无联系人<br><small>点击+添加</small></div>'; return; }
  const sorted = [...contacts].sort((a,b)=>a.name.localeCompare(b.name));
  let lastL = '';
  sorted.forEach(c => {
    const l = c.name[0].toUpperCase();
    if (l !== lastL) {
      const ld = document.createElement('div');
      ld.className = 'contact-letter';
      ld.textContent = l;
      el.appendChild(ld);
      lastL = l;
    }
    const row = document.createElement('div');
    row.className = 'contact-row';
    row.innerHTML = `<div class="avatar" style="background:var(--bg4);color:var(--accent2)">${l}</div><div class="contact-info"><div class="contact-name">${c.name}</div><div class="contact-num">${c.num}</div></div><div class="contact-actions"><button class="action-btn" onclick="event.stopPropagation();startCallTo('${c.name}','${c.num}')" title="拨打"><i class="ti ti-phone"></i></button><button class="action-btn" onclick="event.stopPropagation();msgTo('${c.num}',${mobile})" title="发短信"><i class="ti ti-message"></i></button></div>`;
    el.appendChild(row);
  });
}

function filterContacts(q) {
  const el = document.getElementById('contacts-list');
  if (!el) return;
  const filtered = contacts.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())||c.num.includes(q));
  el.innerHTML='';
  filtered.forEach(c=>{
    const row=document.createElement('div');
    row.className='contact-row';
    row.innerHTML=`<div class="avatar">${c.name[0].toUpperCase()}</div><div class="contact-info"><div class="contact-name">${c.name}</div><div class="contact-num">${c.num}</div></div>`;
    el.appendChild(row);
  });
}

function addContact() {
  const name = prompt('联系人姓名：'); if(!name)return;
  const num = prompt('电话号码：'); if(!num)return;
  contacts.push({name:name.trim(), num:num.replace(/\D/g,'')});
  localStorage.setItem('voip_contacts', JSON.stringify(contacts));
  renderContacts(); renderContactsMob();
  showToast('已添加 '+name+' ✓','success');
}

function msgTo(num, mobile) {
  currentThread = { contact:num, msgs:[] };
  const name = getContactName(num);
  if (mobile||isMobile()) {
    switchMobileView('messages');
    setTimeout(()=>{
      document.getElementById('mobile-list-view').style.display='none';
      document.getElementById('mobile-chat-view').style.display='flex';
      document.getElementById('mob-chat-avatar').textContent=name[0].toUpperCase();
      document.getElementById('mob-chat-name').textContent=name;
      document.getElementById('mob-chat-num').textContent=num;
      document.getElementById('mob-messages').innerHTML='';
    },100);
  } else {
    switchView('messages');
    document.getElementById('empty-state').style.display='none';
    document.getElementById('chat-container').style.display='flex';
    document.getElementById('chat-avatar').textContent=name[0].toUpperCase();
    document.getElementById('chat-name').textContent=name;
    document.getElementById('chat-num').textContent=num;
    document.getElementById('messages').innerHTML='';
  }
}

// ── 通话记录 ───────────────────────────────────────────────────────────────
async function loadCallLog() {
  if (!AUTH) return;
  const el = document.getElementById('recents-list');
  if (el) el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3)">加载中...</div>';
  try {
    const r = await fetch(API+'/api/calls/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:AUTH.username,password:AUTH.password})});
    const data = await r.json();
    renderCallLog('recents-list', data.cdr||[], false);
  } catch(e) { if(el) el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3)">加载失败</div>'; }
}

async function loadCallLogMob() {
  if (!AUTH) return;
  const el = document.getElementById('recents-list-mob');
  if(el) el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3)">加载中...</div>';
  try {
    const r = await fetch(API+'/api/calls/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:AUTH.username,password:AUTH.password})});
    const data = await r.json();
    renderCallLog('recents-list-mob', data.cdr||[], true);
  } catch(e) {}
}

function renderCallLog(elId, cdr, mobile) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (cdr.length===0){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--text3)">暂无通话记录</div>';return;}
  el.innerHTML='';
  cdr.slice(0,50).forEach(c=>{
    const row=document.createElement('div');
    row.className='contact-row';
    const typeColor=c.disposition==='ANSWERED'?'var(--green)':c.disposition==='NO ANSWER'?'var(--red)':'var(--amber)';
    const typeIcon=c.disposition==='ANSWERED'?'ti-phone-incoming':'ti-phone-missed';
    const name=getContactName(c.callerid||c.destination||'-');
    row.innerHTML=`<div class="avatar" style="color:${typeColor}"><i class="ti ${typeIcon}" style="font-size:16px"></i></div><div class="contact-info"><div class="contact-name" style="color:${typeColor}">${name}</div><div class="contact-num">${c.date||''} · ${c.seconds||0}秒</div></div><button class="action-btn" onclick="startCallTo('${name}','${c.callerid||''}')"><i class="ti ti-phone"></i></button>`;
    el.appendChild(row);
  });
}

// ── Toast提示 ──────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type) {
  const t=document.getElementById('toast');
  const icon=document.getElementById('toast-icon');
  document.getElementById('toast-msg').textContent=msg;
  const colors={success:'var(--green)',error:'var(--red)',info:'var(--accent2)',warn:'var(--amber)'};
  const icons={success:'ti-circle-check',error:'ti-circle-x',info:'ti-info-circle',warn:'ti-alert-triangle'};
  icon.className='ti '+(icons[type]||'ti-info-circle');
  icon.style.color=colors[type]||'var(--accent2)';
  t.style.display='flex';
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.style.display='none', 3000);
}

// ── 初始化 ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (!AUTH) return;
  if (isMobile()) {
    document.getElementById('mobile-list-view').style.display='flex';
    document.getElementById('mobile-chat-view').style.display='none';
  }
});
</script>
